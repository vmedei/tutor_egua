exercicios:

  # ── INTRODUÇÃO ──────────────────────────────────────────────────────────────

  - topico: introducao
    enunciado: "Um programa de computador é formado por:"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "Imagens e botões organizados em uma tela"
        - "Uma sequência de instruções que o computador executa, uma por uma"
        - "Arquivos de configuração de hardware"
        - "Textos enviados pela internet"
      correta: 1

  - topico: introducao
    enunciado: "Qual instrução exibe texto na tela em Égua?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "leia()"
        - "imprima()"
        - "escreva()"
        - "mostrar()"
      correta: 2

  - topico: introducao
    enunciado: |
      Complete o código para que "Boa tarde!" seja exibido na tela:

          ___ ("Boa tarde!")
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "escreva"

  - topico: introducao
    enunciado: |
      Escreva um programa em Égua que exiba exatamente:
      Ola, mundo!
    tipo: implementacao_livre
    nivel_bloom: 1
    gabarito:
      descricao: "Use escreva() passando o texto entre aspas"
    casos_de_teste:
      - entrada: ""
        saida_esperada: "Ola, mundo!"

  - topico: introducao
    enunciado: "O que o símbolo // representa em Égua?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "Divisão inteira entre dois números"
        - "Início de um bloco de código"
        - "Um comentário — a linha não é executada pelo interpretador"
        - "Repetição da instrução seguinte"
      correta: 2

  - topico: introducao
    enunciado: |
      Complete a linha para que ela seja tratada como comentário e ignorada pelo interpretador:

          ___ Este trecho não será executado
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "//"

  - topico: introducao
    enunciado: |
      Considere o código abaixo:

          // escreva("Ola")
          escreva("Mundo")

      O que será exibido ao executar esse programa?
    tipo: multipla_escolha
    nivel_bloom: 2
    gabarito:
      opcoes:
        - "Ola"
        - "Mundo"
        - "Ola\nMundo"
        - "Nada — o comentário impede tudo de ser executado"
      correta: 1

  - topico: introducao
    enunciado: "O que a instrução leia() faz quando o programa é executado?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "Exibe um texto formatado na tela"
        - "Aguarda o usuário digitar algo e captura essa entrada"
        - "Encerra o programa imediatamente"
        - "Lê um arquivo salvo no disco"
      correta: 1

  # ── VARIÁVEIS ───────────────────────────────────────────────────────────────

  - topico: variaveis
    enunciado: |
      Qual das opções abaixo reatribui corretamente o valor de uma variável já declarada?
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "var pontos = 20"
        - "pontos = 20"
        - "novo pontos = 20"
        - "pontos := 20"
      correta: 1

  - topico: variaveis
    enunciado: "Qual dos valores abaixo é do tipo booleano em Égua?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "\"verdadeiro\""
        - "1"
        - "verdadeiro"
        - "sim"
      correta: 2

  - topico: variaveis
    enunciado: |
      Complete o código para que a variável armazene a entrada como número inteiro:

          var n = ___(leia())
          escreva(n + 1)
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "inteiro"

  - topico: variaveis
    enunciado: |
      Leia um nome e exiba a saudação no formato exato:
      Ola, <nome>!

      Exemplo: entrada "Maria" → saída "Ola, Maria!"
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use leia() e concatene com 'Ola, ' e '!'"
    casos_de_teste:
      - entrada: "Maria"
        saida_esperada: "Ola, Maria!"
      - entrada: "Carlos"
        saida_esperada: "Ola, Carlos!"
      - entrada: "Ana"
        saida_esperada: "Ola, Ana!"

  - topico: variaveis
    enunciado: "Qual tipo de valor é retornado por leia() independentemente do que o usuário digitar?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "inteiro"
        - "real"
        - "texto"
        - "depende do que foi digitado"
      correta: 2

  - topico: variaveis
    enunciado: |
      Leia uma cor e exiba a mensagem no formato:
      Cor escolhida: <cor>

      Exemplo: entrada "azul" → saída "Cor escolhida: azul"
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Armazene a entrada em uma variável e concatene com o prefixo"
    casos_de_teste:
      - entrada: "azul"
        saida_esperada: "Cor escolhida: azul"
      - entrada: "verde"
        saida_esperada: "Cor escolhida: verde"
      - entrada: "roxo"
        saida_esperada: "Cor escolhida: roxo"

  - topico: variaveis
    enunciado: |
      Complete o código para que o segundo escreva mostre o valor atualizado:

          var placar = 0
          placar = ___
          escreva(placar)
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "placar + 1"

  - topico: variaveis
    enunciado: |
      Leia uma cidade e exiba:
      Cidade: <cidade>

      Exemplo: entrada "Recife" → saída "Cidade: Recife"
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use uma variável para armazenar leia() e concatene com o prefixo"
    casos_de_teste:
      - entrada: "Belem"
        saida_esperada: "Cidade: Belem"
      - entrada: "Manaus"
        saida_esperada: "Cidade: Manaus"
      - entrada: "Recife"
        saida_esperada: "Cidade: Recife"

  # ── OPERADORES ──────────────────────────────────────────────────────────────

  - topico: operadores
    enunciado: "O que o operador % calcula entre dois inteiros?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "A divisão inteira (quociente)"
        - "O resto da divisão"
        - "A porcentagem do segundo sobre o primeiro"
        - "A potência do primeiro pelo segundo"
      correta: 1

  - topico: operadores
    enunciado: |
      Complete o código. A condição deve ser verdadeira apenas quando x está entre 1 e 9:

          se (x > 0 ___ x < 10) {
            escreva("entre 1 e 9")
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "e"

  - topico: operadores
    enunciado: |
      Leia dois números inteiros e exiba a soma deles.
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use inteiro(leia()) para cada número e some com +"
    casos_de_teste:
      - entrada: "5\n3"
        saida_esperada: "8"
      - entrada: "10\n-4"
        saida_esperada: "6"
      - entrada: "0\n0"
        saida_esperada: "0"

  - topico: operadores
    enunciado: |
      Considere que `a = 10` e `b = 3`. Qual é o resultado de `a % b`?
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "3"
        - "1"
        - "0"
        - "30"
      correta: 1

  - topico: operadores
    enunciado: |
      Complete o código para que a condição verifique maioridade:

          se (idade ___ 18) {
            escreva("maior de idade")
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: ">="

  - topico: operadores
    enunciado: |
      Leia dois números inteiros e exiba a diferença entre o primeiro e o segundo.
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Converta as entradas para inteiro e subtraia o segundo do primeiro"
    casos_de_teste:
      - entrada: "9\n4"
        saida_esperada: "5"
      - entrada: "3\n8"
        saida_esperada: "-5"
      - entrada: "10\n10"
        saida_esperada: "0"

  - topico: operadores
    enunciado: "Qual operador verifica se dois valores são iguais em Égua?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "="
        - "=="
        - "==="
        - "igual"
      correta: 1

  - topico: operadores
    enunciado: |
      Complete a condição para que a mensagem seja exibida quando numero for diferente de zero:

          se (numero ___ 0) {
            escreva("nao zero")
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "!="

  - topico: operadores
    enunciado: |
      Leia dois números inteiros e exiba o produto deles.
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Converta as duas entradas para inteiro e multiplique"
    casos_de_teste:
      - entrada: "4\n3"
        saida_esperada: "12"
      - entrada: "7\n0"
        saida_esperada: "0"
      - entrada: "-2\n5"
        saida_esperada: "-10"

  # ── CONDICIONAIS ────────────────────────────────────────────────────────────

  - topico: condicionais
    enunciado: |
      Qual das opções abaixo representa corretamente uma estrutura condicional com alternativa em Égua?
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "se (...) { } else { }"
        - "if (...) { } senão { }"
        - "se (...) { } senão { }"
        - "para (...) { } senão { }"
      correta: 2

  - topico: condicionais
    enunciado: |
      Complete o código para executar o bloco quando nota for suficiente para aprovação:

          ___ (nota >= 7) {
            escreva("aprovado")
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "se"

  - topico: condicionais
    enunciado: |
      Leia um número inteiro e exiba:
      - "positivo" se for maior que zero
      - "negativo" se for menor que zero
      - "zero" se for exatamente zero
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use se / senão se / senão com inteiro(leia())"
    casos_de_teste:
      - entrada: "5"
        saida_esperada: "positivo"
      - entrada: "-3"
        saida_esperada: "negativo"
      - entrada: "0"
        saida_esperada: "zero"

  - topico: condicionais
    enunciado: "Qual estrutura permite testar uma segunda condição quando a primeira é falsa, sem entrar no bloco senão definitivo?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "senão"
        - "senão se"
        - "ou se"
        - "caso"
      correta: 1

  - topico: condicionais
    enunciado: |
      Complete a condição para que o bloco execute quando temperatura estiver abaixo do conforto térmico:

          se (temperatura ___ 20) {
            escreva("frio")
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "<"

  - topico: condicionais
    enunciado: |
      Leia uma idade inteira e exiba:
      - "maior" se for maior ou igual a 18
      - "menor" caso contrário
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use se/senão e compare com 18 usando inteiro(leia())"
    casos_de_teste:
      - entrada: "18"
        saida_esperada: "maior"
      - entrada: "12"
        saida_esperada: "menor"
      - entrada: "25"
        saida_esperada: "maior"

  - topico: condicionais
    enunciado: |
      Considere o código:

          var x = 5
          se (x > 10) {
            escreva("grande")
          } senão se (x > 3) {
            escreva("medio")
          } senão {
            escreva("pequeno")
          }

      O que será exibido?
    tipo: multipla_escolha
    nivel_bloom: 2
    gabarito:
      opcoes:
        - "grande"
        - "medio"
        - "pequeno"
        - "grande\nmedio"
      correta: 1

  - topico: condicionais
    enunciado: |
      Leia uma nota inteira e exiba:
      - "aprovado" se for maior ou igual a 7
      - "reprovado" caso contrário
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use se/senão e compare com 7 usando inteiro(leia())"
    casos_de_teste:
      - entrada: "7"
        saida_esperada: "aprovado"
      - entrada: "10"
        saida_esperada: "aprovado"
      - entrada: "5"
        saida_esperada: "reprovado"

  - topico: condicionais
    enunciado: |
      Leia dois números inteiros e exiba o maior deles.
      Se forem iguais, exiba qualquer um dos dois.
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use se/senão para comparar e exibir o maior com inteiro(leia())"
    casos_de_teste:
      - entrada: "7\n3"
        saida_esperada: "7"
      - entrada: "2\n8"
        saida_esperada: "8"
      - entrada: "5\n5"
        saida_esperada: "5"

  - topico: condicionais
    enunciado: |
      Leia um número inteiro e exiba:
      - "par" se o número for divisível por 2
      - "impar" caso contrário
    tipo: implementacao_livre
    nivel_bloom: 2
    gabarito:
      descricao: "Use o operador % para verificar o resto da divisão por 2"
    casos_de_teste:
      - entrada: "2"
        saida_esperada: "par"
      - entrada: "9"
        saida_esperada: "impar"
      - entrada: "0"
        saida_esperada: "par"

  # ── LAÇOS ───────────────────────────────────────────────────────────────────

  - topico: lacos
    enunciado: |
      Qual a diferença principal entre para e enquanto em Égua?
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "para executa ao menos uma vez; enquanto pode não executar nenhuma vez"
        - "para é usado quando o número de repetições é conhecido; enquanto quando depende de uma condição"
        - "para só funciona com números; enquanto funciona com qualquer tipo"
        - "Não há diferença — são intercambiáveis em todos os casos"
      correta: 1

  - topico: lacos
    enunciado: |
      Complete o código para criar um laço que exibe os números 0, 1 e 2:

          ___ (var i = 0; i < 3; i = i + 1) {
            escreva(i)
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "para"

  - topico: lacos
    enunciado: |
      Leia um número inteiro N e exiba a soma de todos os inteiros de 1 até N.
    tipo: implementacao_livre
    nivel_bloom: 3
    gabarito:
      descricao: "Use para ou enquanto para acumular a soma em uma variável"
    casos_de_teste:
      - entrada: "5"
        saida_esperada: "15"
      - entrada: "3"
        saida_esperada: "6"
      - entrada: "10"
        saida_esperada: "55"

  - topico: lacos
    enunciado: |
      Considere o código abaixo. Quantas vezes "ok" será exibido?

          var i = 0
          enquanto (i < 4) {
            escreva("ok")
            i = i + 1
          }
    tipo: multipla_escolha
    nivel_bloom: 2
    gabarito:
      opcoes:
        - "3"
        - "4"
        - "5"
        - "Infinito — o laço não para"
      correta: 1

  - topico: lacos
    enunciado: |
      Complete o código para que o laço repita enquanto o contador for menor que 3:

          var contador = 0
          ___ (contador < 3) {
            escreva(contador)
            contador = contador + 1
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "enquanto"

  - topico: lacos
    enunciado: |
      Leia um número inteiro N e exiba todos os números de 1 até N, um por linha.
    tipo: implementacao_livre
    nivel_bloom: 3
    gabarito:
      descricao: "Use um laço iniciando em 1 e avançando até N"
    casos_de_teste:
      - entrada: "3"
        saida_esperada: "1\n2\n3"
      - entrada: "1"
        saida_esperada: "1"
      - entrada: "5"
        saida_esperada: "1\n2\n3\n4\n5"

  - topico: lacos
    enunciado: |
      Complete a expressão de decremento para que o laço conte de 5 até 1:

          para (var i = 5; i >= 1; i = i ___ 1) {
            escreva(i)
          }
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "-"

  - topico: lacos
    enunciado: |
      Leia um número inteiro N e exiba os primeiros N múltiplos de 3 (3, 6, 9, ...).

      Exemplo: N=4 → 3, 6, 9, 12
    tipo: implementacao_livre
    nivel_bloom: 3
    gabarito:
      descricao: "Use um laço de 1 até N e exiba 3 * contador"
    casos_de_teste:
      - entrada: "4"
        saida_esperada: "3\n6\n9\n12"
      - entrada: "2"
        saida_esperada: "3\n6"
      - entrada: "5"
        saida_esperada: "3\n6\n9\n12\n15"

  - topico: lacos
    enunciado: |
      Leia um número inteiro N e exiba a contagem regressiva de N até 1.
    tipo: implementacao_livre
    nivel_bloom: 3
    gabarito:
      descricao: "Use um laço diminuindo o contador a cada iteração"
    casos_de_teste:
      - entrada: "3"
        saida_esperada: "3\n2\n1"
      - entrada: "1"
        saida_esperada: "1"
      - entrada: "4"
        saida_esperada: "4\n3\n2\n1"

  # ── FUNÇÕES ─────────────────────────────────────────────────────────────────

  - topico: funcoes
    enunciado: "O que acontece quando o código dentro de uma função alcança uma instrução retorna?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "O programa encerra completamente"
        - "A função para de executar e devolve o valor ao chamador"
        - "A função reinicia do início"
        - "O valor é impresso automaticamente na tela"
      correta: 1

  - topico: funcoes
    enunciado: |
      Complete a declaração para que o código funcione corretamente:

          ___ dobro(n) {
            retorna n * 2
          }
          escreva(dobro(5))
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "função"

  - topico: funcoes
    enunciado: |
      Leia dois números inteiros e exiba o produto deles usando uma função chamada multiplica.
    tipo: implementacao_livre
    nivel_bloom: 3
    gabarito:
      descricao: "Declare função multiplica(a, b) { retorna a * b } e exiba sua chamada"
    casos_de_teste:
      - entrada: "4\n5"
        saida_esperada: "20"
      - entrada: "3\n7"
        saida_esperada: "21"
      - entrada: "6\n6"
        saida_esperada: "36"

  - topico: funcoes
    enunciado: "Qual das afirmações sobre funções em Égua está correta?"
    tipo: multipla_escolha
    nivel_bloom: 1
    gabarito:
      opcoes:
        - "Uma função pode ser chamada apenas uma vez por programa"
        - "Funções permitem nomear e reutilizar blocos de código"
        - "Toda função precisa obrigatoriamente de parâmetros"
        - "O retorno de uma função é sempre exibido automaticamente"
      correta: 1

  - topico: funcoes
    enunciado: |
      Complete o código para que a função devolva seu resultado ao chamador:

          função quadrado(n) {
            ___ n * n
          }
          escreva(quadrado(4))
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "retorna"

  - topico: funcoes
    enunciado: |
      Leia um número inteiro e exiba seu quadrado, usando uma função chamada quadrado.
    tipo: implementacao_livre
    nivel_bloom: 3
    gabarito:
      descricao: "Declare função quadrado(n) { retorna n * n } e exiba a chamada com o número lido"
    casos_de_teste:
      - entrada: "4"
        saida_esperada: "16"
      - entrada: "7"
        saida_esperada: "49"
      - entrada: "0"
        saida_esperada: "0"

  - topico: funcoes
    enunciado: |
      Considere o código:

          função saudar(nome) {
            escreva("Oi, " + nome)
          }

      Qual das opções abaixo chama a função corretamente?
    tipo: multipla_escolha
    nivel_bloom: 2
    gabarito:
      opcoes:
        - "saudar"
        - "chamar saudar(\"Ana\")"
        - "saudar(\"Ana\")"
        - "função saudar(\"Ana\")"
      correta: 2

  - topico: funcoes
    enunciado: |
      Complete o código para chamar a função e obter o resultado:

          função soma(a, b) {
            retorna a + b
          }
          var resultado = ___(3, 4)
          escreva(resultado)
    tipo: completar_codigo
    nivel_bloom: 1
    gabarito:
      resposta: "soma"

  - topico: funcoes
    enunciado: |
      Leia três números inteiros e exiba a soma deles usando uma função chamada somaTres.
    tipo: implementacao_livre
    nivel_bloom: 3
    gabarito:
