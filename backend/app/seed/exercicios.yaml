  - topico: classes
    enunciado: |
      Considere o código abaixo. O que será exibido?

          classe Contador {
            construtor() {
              isto.valor = 0
            }
            incrementar() {
              isto.valor = isto.valor + 1
            }
          }
          var c = Contador()
          c.incrementar()
          c.incrementar()
          escreva(c.valor)
